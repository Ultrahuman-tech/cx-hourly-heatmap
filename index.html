<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CX Hourly Heatmap</title>
<style>
/* ── tokens ─────────────────────────────────────────────────── */
:root {
  --bg:      #F4F2FA;
  --surface: #FFFFFF;
  --ink:     #130C22;
  --ink2:    #6C647E;
  --ink3:    #B0AAC0;
  --purple:  #5B21B6;
  --purple-l:#EDE9FE;
  --sh-sm:   0 1px 3px rgba(19,12,34,.06), 0 1px 2px rgba(19,12,34,.04);
  --sh-md:   0 4px 20px rgba(19,12,34,.08), 0 1px 4px rgba(19,12,34,.05);
  --sh-xl:   0 24px 64px rgba(19,12,34,.18), 0 4px 16px rgba(19,12,34,.08);
}
*  { box-sizing:border-box; margin:0; padding:0 }
body { font: 13.5px/1.5 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased }

/* ── header ─────────────────────────────────────────────────── */
header {
  position:sticky; top:0; z-index:40;
  background:rgba(255,255,255,.88); backdrop-filter:blur(14px);
  padding:14px 24px 10px; display:flex; flex-direction:column; gap:10px;
  box-shadow:0 1px 0 rgba(19,12,34,.06);
}
.hrow { display:flex; align-items:center; gap:10px; flex-wrap:wrap }
h1 { font-size:17px; font-weight:700; letter-spacing:-.02em; color:var(--ink) }
.datechip {
  font-size:11.5px; font-weight:600; padding:3px 10px;
  background:var(--purple-l); color:var(--purple); border-radius:999px
}
.spacer { flex:1 }

/* buttons */
button, label.btn, select {
  font:inherit; cursor:pointer; transition:.15s;
  background:var(--surface); color:var(--ink);
  border:none; border-radius:10px;
  padding:7px 13px; font-size:12.5px; font-weight:500;
  box-shadow:var(--sh-sm);
}
button:hover, label.btn:hover { background:#F9F7FF; box-shadow:var(--sh-md) }
button:active { transform:scale(.97) }
select { padding:7px 10px; color:var(--ink2) }

/* segment controls */
.seg {
  display:inline-flex; border-radius:10px; overflow:hidden;
  background:var(--surface); box-shadow:var(--sh-sm); gap:1px; padding:3px;
}
.seg button {
  border-radius:7px; box-shadow:none; padding:5px 12px;
  font-size:12px; color:var(--ink2); background:transparent
}
.seg button.on { background:var(--ink); color:#fff; box-shadow:var(--sh-sm) }
.seg button:hover:not(.on) { background:#F0EDF8; color:var(--ink) }

/* legend */
.legend { display:inline-flex; align-items:center; gap:8px; font-size:11.5px; color:var(--ink3) }
.scale  { width:100px; height:8px; border-radius:99px;
          background:linear-gradient(90deg,#EDE9FE,#8B5CF6,#3B0764) }

/* ── summary cards ───────────────────────────────────────────── */
.cards { display:flex; gap:10px; flex-wrap:wrap; padding:16px 24px 4px }
.card  {
  background:var(--surface); border-radius:16px; padding:14px 18px;
  min-width:110px; box-shadow:var(--sh-sm); flex:1; max-width:180px;
}
.card .k {
  font-size:10.5px; font-weight:600; letter-spacing:.06em;
  text-transform:uppercase; color:var(--ink3); margin-bottom:5px;
  display:flex; align-items:center; gap:5px
}
.card .v { font-size:26px; font-weight:720; letter-spacing:-.03em; color:var(--ink) }
.card .v small { font-size:13px; font-weight:500; color:var(--ink3); margin-left:2px }
.dot { width:7px; height:7px; border-radius:50%; display:inline-block }

/* ── status hint ─────────────────────────────────────────────── */
.hint { font-size:11.5px; color:var(--ink3); padding:4px 24px 0 }

/* ── table wrap ──────────────────────────────────────────────── */
.wrap { padding:12px 24px 60px; overflow:auto }

/* ── table ───────────────────────────────────────────────────── */
table {
  border-collapse:separate;
  border-spacing:3px;
  width:100%;
}
th, td { text-align:center; font-variant-numeric:tabular-nums }

/* header row */
thead th {
  position:sticky; top:0; z-index:5; background:var(--bg);
  font-size:10.5px; font-weight:600; color:var(--ink3);
  padding:4px 2px 8px; white-space:nowrap;
}
thead th.agcol { z-index:8 }
thead th.totcol { z-index:8 }

/* agent column */
.agcol {
  position:sticky; left:0; z-index:6; background:var(--bg);
  text-align:left; padding:6px 14px 6px 4px; min-width:210px;
}
/* total column */
.totcol {
  position:sticky; right:0; z-index:6; background:var(--bg);
  min-width:58px; font-size:13px; font-weight:700; color:var(--ink);
}

/* cells */
td.cell {
  cursor:pointer; height:36px; min-width:36px;
  border-radius:6px; font-size:12px; font-weight:600;
  position:relative; transition:transform .1s, box-shadow .1s;
}
td.cell:hover { transform:scale(1.12); z-index:3; box-shadow:0 4px 12px rgba(59,7,100,.22) }
td.cell.zero { opacity:.55 }
td.tot  { border-radius:8px }
td.foot { font-size:11.5px; font-weight:600; color:var(--ink2) }

/* midnight dashed separator — shift mode */
td.daybreak, th.daybreak { border-left:2px dashed rgba(91,33,182,.2) !important }

/* agent meta */
.agname { font-size:13px; font-weight:600; color:var(--ink); line-height:1.3 }
.agmeta { display:flex; align-items:center; gap:5px; margin-top:2px }
.statusdot {
  width:6px; height:6px; border-radius:50%; display:inline-block; flex-shrink:0
}
.statusdot.online { background:#22C55E }
.statusdot.busy   { background:#F59E0B }
.statusdot.away   { background:#D1D5DB }

/* agent selectable tags */
.agtags { display:flex; flex-wrap:wrap; gap:4px; margin-top:6px }
.atag {
  font-size:10px; font-weight:600; padding:2px 7px; border-radius:999px;
  cursor:pointer; user-select:none; transition:.12s;
  background:#EDEBF5; color:#B0AAC0; letter-spacing:.01em;
}
.atag:hover { background:#DDD8F0; color:#6C647E }
.atag.on    { box-shadow:0 1px 3px rgba(0,0,0,.12) }

/* footer row */
tfoot td { padding:6px 3px; font-size:11.5px; font-weight:700; color:var(--ink2) }
tfoot .agcol { color:var(--ink3); font-weight:500 }

/* ── modal ───────────────────────────────────────────────────── */
.scrim {
  position:fixed; inset:0; z-index:50;
  background:rgba(19,12,34,.35); backdrop-filter:blur(4px);
  display:none; align-items:center; justify-content:center
}
.scrim.show { display:flex }
.modal {
  background:var(--surface); border-radius:22px;
  min-width:340px; max-width:90vw; max-height:82vh; overflow:auto;
  box-shadow:var(--sh-xl); animation:popIn .18s cubic-bezier(.34,1.4,.64,1) both
}
@keyframes popIn { from{opacity:0;transform:scale(.94)} to{opacity:1;transform:scale(1)} }
.mhead {
  padding:18px 20px 14px; display:flex; align-items:flex-start; justify-content:space-between;
  border-bottom:1px solid #F0EDF8
}
.mhead h3 { font-size:15px; font-weight:700; color:var(--ink) }
.mhead .msub { font-size:12px; color:var(--ink3); margin-top:2px }
.mclose {
  width:28px; height:28px; border-radius:50%; display:flex; align-items:center;
  justify-content:center; background:#F4F2FA; color:var(--ink2);
  cursor:pointer; flex-shrink:0; font-size:13px; border:none; box-shadow:none
}
.mclose:hover { background:#EDE9FE; color:var(--purple) }
.mbody { padding:16px 20px 20px }
.mtable { width:100%; border-collapse:collapse }
.mtable th {
  text-align:left; font-size:11px; font-weight:600; letter-spacing:.05em;
  text-transform:uppercase; color:var(--ink3); padding:6px 10px 4px
}
.mtable td {
  padding:8px 10px; font-size:13px; color:var(--ink);
  border-top:1px solid #F4F2FA
}
.mtable tr:first-child td { border-top:none }
.mtable td:not(:first-child) { text-align:right; font-variant-numeric:tabular-nums }
.mtable td b { font-weight:700 }
.mpills { display:flex; gap:6px; flex-wrap:wrap; margin-top:12px }
.mpill {
  font-size:11px; padding:2.5px 9px; border-radius:999px;
  font-weight:600; letter-spacing:.01em
}

/* ── drop zone ───────────────────────────────────────────────── */
.drop {
  position:fixed; inset:0; z-index:60;
  background:rgba(93,33,182,.07); border:3px dashed #8B5CF6;
  display:none; align-items:center; justify-content:center;
  font-size:18px; font-weight:700; color:#6D28D9; letter-spacing:-.01em
}
.drop.show { display:flex }
</style>
</head>
<body>

<header>
  <div class="hrow">
    <h1>CX Hourly Heatmap</h1>
    <span class="datechip" id="datechip">—</span>
    <div class="spacer"></div>
    <label class="btn">↑ Import<input id="file" type="file" accept=".csv,.json" hidden></label>
    <button id="loadConsole" title="Fetch live when embedded on the console origin">⟳ Console</button>
    <button id="expCsv">↓ CSV</button>
    <button id="expJson">↓ JSON</button>
    <button id="loadSample">Sample</button>
  </div>
  <div class="hrow">
    <div class="seg" id="dutyFilter">
      <button data-d="all" class="on">All</button>
      <button data-d="Email">Email</button>
      <button data-d="Deferred">Deferred</button>
    </div>
    <div class="seg" id="orderSeg">
      <button data-o="shift" class="on">Shift 7am→7am</button>
      <button data-o="cal">Calendar 12am→</button>
    </div>
    <div class="seg">
      <label class="btn" style="box-shadow:none;padding:5px 12px;font-size:12px;color:var(--ink2)">
        Sort
        <select id="sort" style="box-shadow:none;padding:0 2px;font-size:12px">
          <option value="total">Total ↓</option>
          <option value="name">Name</option>
          <option value="duty">Duty</option>
        </select>
      </label>
    </div>
    <div class="spacer"></div>
    <span class="legend"><span>low</span><span class="scale"></span><span>high</span>
      <span style="margin-left:4px">· click tile for breakdown</span></span>
  </div>
</header>

<div class="cards" id="cards"></div>
<div class="hint" id="metric"></div>
<div class="wrap"><div id="grid"></div></div>

<div class="scrim" id="scrim">
  <div class="modal" id="modal"></div>
</div>
<div class="drop" id="drop">Drop CSV or JSON to load</div>

<script>
/* ── state ───────────────────────────────────────────────────── */
const HOURS_CAL   = [...Array(24).keys()];
const HOURS_SHIFT = [...HOURS_CAL.slice(7), ...HOURS_CAL.slice(0,7)];
const state = { date:'', agents:[], order:'shift', duty:'all', sort:'total',
                metric:'tickets', fields:['replies','escalated','closed'],
                tags:{} }; // { agentName: { tagKey: bool } } — persists across re-renders

/* Selectable admin tags — colour shown when active, faded when not */
const TAGS = [
  { key:'Escalations',  activeBg:'#FEE2E2', activeColor:'#B91C1C' },
  { key:'Critical',     activeBg:'#FEF3C7', activeColor:'#92400E' },
  { key:'Quick Verify', activeBg:'#DBEAFE', activeColor:'#1E40AF' },
  { key:'Aging',        activeBg:'#D1FAE5', activeColor:'#065F46' },
];

function hourLabel(h){ const x=h%12||12; return x+(h<12?'a':'p') }

/* ── color: single white → deep purple ramp ──────────────────── */
function buildStats(){
  const vals=[];
  state.agents.forEach(a=>HOURS_CAL.forEach(h=>{ const v=a.hours[h]||0; if(v>0) vals.push(v); }));
  const max = vals.length ? Math.max(...vals) : 1;
  return { max };
}

function cellColor(v, st){
  if(!v) return { bg:'#EEEAF8', fg:'#C4B8E0' };      // empty — faint lavender, muted text
  // 5-stop gradient: lavender-white → mid-purple → deep purple
  const STOPS = [
    [237,233,254],   // 0%   #EDE9FE
    [196,181,253],   // 25%  #C4B5FD
    [139, 92,246],   // 50%  #8B5CF6
    [109, 40,217],   // 75%  #6D28D9
    [ 59,  7,100],   // 100% #3B0764
  ];
  const t  = Math.max(0.04, Math.min(1, v / st.max));
  const si = Math.min(3, Math.floor(t * 4));
  const st2 = (t * 4) - si;
  const a  = STOPS[si], b = STOPS[si+1];
  const c  = a.map((x,i) => Math.round(x + (b[i]-x) * st2));
  const lum = (c[0]*299 + c[1]*587 + c[2]*114) / 1000;
  return { bg:`rgb(${c[0]},${c[1]},${c[2]})`, fg: lum < 155 ? '#FFFFFF' : '#3B0764' };
}

/* ── visible / sorted agents ─────────────────────────────────── */
function visibleAgents(){
  let a = state.agents.slice();
  if(state.duty!=='all') a=a.filter(x=>x.duty===state.duty||(state.duty==='Email'&&x.duty==='Both')||(state.duty==='Deferred'&&x.duty==='Both'));
  const tot = x => HOURS_CAL.reduce((s,h)=>s+(x.hours[h]||0),0);
  if(state.sort==='total')      a.sort((x,y)=>tot(y)-tot(x));
  else if(state.sort==='name')  a.sort((x,y)=>x.name.localeCompare(y.name));
  else if(state.sort==='duty')  a.sort((x,y)=>(x.duty||'').localeCompare(y.duty||'')||tot(y)-tot(x));
  return a;
}
function agentTotal(a){ return HOURS_CAL.reduce((s,h)=>s+(a.hours[h]||0),0) }

/* ── render ──────────────────────────────────────────────────── */
function render(){
  const order = state.order==='shift' ? HOURS_SHIFT : HOURS_CAL;
  const st    = buildStats();
  const ags   = visibleAgents();

  /* cards */
  const grand   = state.agents.reduce((s,a)=>s+agentTotal(a),0);
  const byDuty  = {};
  state.agents.forEach(a=>{ byDuty[a.duty]=(byDuty[a.duty]||0)+agentTotal(a); });
  const active  = state.agents.filter(a=>agentTotal(a)>0).length;
  const colTot  = {};
  order.forEach(h=> colTot[h]=state.agents.reduce((s,a)=>s+(a.hours[h]||0),0));
  let peakH = order[0];
  order.forEach(h=>{ if(colTot[h]>colTot[peakH]) peakH=h; });

  document.getElementById('datechip').textContent =
    state.date || (state.agents===SAMPLE_FLAG.ref ? 'Sample data' : '—');
  document.getElementById('cards').innerHTML = `
    <div class="card">
      <div class="k">Total ${state.metric}</div>
      <div class="v">${grand.toLocaleString()}</div>
    </div>
    <div class="card">
      <div class="k">Active agents</div>
      <div class="v">${active}<small> / ${state.agents.length}</small></div>
    </div>
    <div class="card">
      <div class="k"><span class="dot" style="background:#8B5CF6"></span>Email duty</div>
      <div class="v">${(byDuty['Email']||0)+(byDuty['Both']||0)}</div>
    </div>
    <div class="card">
      <div class="k"><span class="dot" style="background:#22C55E"></span>Deferred duty</div>
      <div class="v">${(byDuty['Deferred']||0)+(byDuty['Both']||0)}</div>
    </div>
    <div class="card">
      <div class="k">Peak hour</div>
      <div class="v">${hourLabel(peakH)}<small>–${hourLabel((peakH+1)%24)}  ${colTot[peakH]}</small></div>
    </div>`;

  document.getElementById('metric').textContent =
    `Duty is read from the console queue field in the data — not the roster.` +
    (state.agents===SAMPLE_FLAG.ref ? '  ⚠ Showing sample data — import a CSV or JSON to replace.' : '');

  /* table */
  let thead = `<tr>
    <th class="agcol">Agent</th>`;
  order.forEach(h => {
    thead += `<th class="${state.order==='shift'&&h===0?'daybreak':''}">${hourLabel(h)}</th>`;
  });
  thead += `<th class="totcol">Total</th></tr>`;

  let body = '';
  ags.forEach(a => {
    const sl = (a.status||'').toLowerCase();
    const sdot = `<span class="statusdot ${sl.includes('online')?'online':sl.includes('busy')?'busy':'away'}"></span>`;
    const agTags = state.tags[a.name]||{};
    const tagHtml = TAGS.map(t => {
      const on = !!agTags[t.key];
      return `<span class="atag${on?' on':''}" data-tag-ag="${esc(a.name)}" data-tag-key="${t.key}"
        style="${on?`background:${t.activeBg};color:${t.activeColor}`:''}">
        ${t.key}</span>`;
    }).join('');
    body += `<tr>
      <td class="agcol">
        <div class="agname">${esc(a.name)}</div>
        <div class="agmeta">
          ${sdot}
          <span style="font-size:11px;color:var(--ink3)">${esc(a.status||'')}</span>
        </div>
        <div class="agtags">${tagHtml}</div>
      </td>`;
    order.forEach(h => {
      const v = a.hours[h]||0;
      const c = cellColor(v, st);
      body += `<td class="cell${v?'':' zero'}${state.order==='shift'&&h===0?' daybreak':''}"
        style="background:${c.bg};color:${c.fg}"
        data-ag="${esc(a.name)}" data-h="${h}">${v||''}</td>`;
    });
    const tc = cellColor(agentTotal(a), st);
    body += `<td class="cell tot" style="background:${tc.bg};color:${tc.fg}"
      data-ag="${esc(a.name)}" data-h="all">${agentTotal(a)}</td></tr>`;
  });

  let foot = `<tr><td class="agcol foot">Hour total</td>`;
  order.forEach(h => {
    foot += `<td class="foot${state.order==='shift'&&h===0?' daybreak':''}">${colTot[h]||''}</td>`;
  });
  foot += `<td class="foot totcol">${grand}</td></tr>`;

  document.getElementById('grid').innerHTML =
    `<table><thead>${thead}</thead><tbody>${body}</tbody><tfoot>${foot}</tfoot></table>`;
  document.querySelectorAll('td.cell').forEach(td=>td.onclick=()=>openModal(td.dataset.ag,td.dataset.h));

  /* tag click delegation — stops propagation so the modal doesn't open */
  document.querySelectorAll('.atag').forEach(el => {
    el.onclick = e => {
      e.stopPropagation();
      toggleTag(el.dataset.tagAg, el.dataset.tagKey);
    };
  });
}

function toggleTag(name, key){
  if(!state.tags[name]) state.tags[name]={};
  state.tags[name][key] = !state.tags[name][key];
  render();
}

function esc(s){
  return (s==null?'':String(s)).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
}

/* ── modal ───────────────────────────────────────────────────── */
function openModal(name, h){
  const a = state.agents.find(x=>x.name===name); if(!a) return;
  const sdot = `<span class="statusdot ${(a.status||'').toLowerCase().includes('online')?'online':(a.status||'').toLowerCase().includes('busy')?'busy':'away'}" style="width:8px;height:8px"></span>`;

  let inner = '';
  if(h === 'all'){
    const ordr = state.order==='shift' ? HOURS_SHIFT : HOURS_CAL;
    let rows = '';
    ordr.forEach(hh=>{
      const t = a.hours[hh]||0; if(!t) return;
      const b = a.breakdown&&a.breakdown[hh]||{};
      rows += `<tr><td>${hourLabel(hh)}–${hourLabel((hh+1)%24)}</td>
        ${state.fields.map(f=>`<td>${b[f]??'—'}</td>`).join('')}
        <td><b>${t}</b></td></tr>`;
    });
    rows += `<tr style="border-top:2px solid #EDE9FE">
      <td><b>Total</b></td>
      ${state.fields.map(f=>`<td><b>${sumField(a,f)}</b></td>`).join('')}
      <td><b>${agentTotal(a)}</b></td></tr>`;
    inner = `<table class="mtable">
      <tr><th>Hour</th>${state.fields.map(f=>`<th>${f}</th>`).join('')}<th>Total</th></tr>
      ${rows}</table>`;
  } else {
    const b = a.breakdown&&a.breakdown[h]||{};
    inner = `<table class="mtable">
      ${state.fields.map(f=>`<tr><td>${f.charAt(0).toUpperCase()+f.slice(1)}</td><td><b>${b[f]??'—'}</b></td></tr>`).join('')}
      <tr style="border-top:2px solid #EDE9FE"><td>Total</td><td><b>${a.hours[h]||0}</b></td></tr>
    </table>`;
  }

  document.getElementById('modal').innerHTML = `
    <div class="mhead">
      <div>
        <h3>${esc(name)}</h3>
        <div class="msub">${h==='all'?'Full day breakdown':`Hour ${hourLabel(+h)}–${hourLabel((+h+1)%24)}`}</div>
      </div>
      <button class="mclose" onclick="closeModal()">✕</button>
    </div>
    <div class="mbody">
      ${inner}
      <div class="mpills" style="margin-top:14px">
        <span class="mpill" style="background:#F4F2FA;color:#6C647E">${sdot} ${esc(a.status||'—')}</span>
        ${TAGS.filter(t=>(state.tags[a.name]||{})[t.key]).map(t=>
          `<span class="mpill" style="background:${t.activeBg};color:${t.activeColor}">${t.key}</span>`
        ).join('')}
        ${a.email?`<span class="mpill" style="background:#F3F4F6;color:#9CA3AF;font-weight:400">${esc(a.email)}</span>`:''}
      </div>
    </div>`;
  document.getElementById('scrim').classList.add('show');
}
function sumField(a,f){
  let s=0; HOURS_CAL.forEach(h=>{ const b=a.breakdown&&a.breakdown[h]; if(b&&b[f]!=null) s+=+b[f]; }); return s;
}
function closeModal(){ document.getElementById('scrim').classList.remove('show') }
document.getElementById('scrim').onclick = e=>{ if(e.target.id==='scrim') closeModal() };

/* ── ingest ──────────────────────────────────────────────────── */
function normDuty(s){
  s=(s||'').toLowerCase();
  if(/email/.test(s)) return 'Email';
  if(/defer|chat|advisor/.test(s)) return 'Deferred';
  if(/both/.test(s)) return 'Both';
  return 'Unknown';
}
function csvRows(text){
  const rows=[]; let i=0,f='',row=[],q=false;
  while(i<text.length){ const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){f+='"';i++;} else q=false; } else f+=c; }
    else { if(c==='"') q=true; else if(c===','){row.push(f);f='';}
      else if(c==='\n'||c==='\r'){ if(c==='\r'&&text[i+1]==='\n')i++;
        if(f!==''||row.length){row.push(f);rows.push(row);} f='';row=[]; }
      else f+=c; }
    i++; }
  if(f!==''||row.length){row.push(f);rows.push(row);}
  return rows.filter(r=>r.length>1||(r.length===1&&r[0].trim()!==''));
}
function ingestCSV(text){
  let rows=csvRows(text);
  let hi=rows.findIndex(r=>r.some(c=>/^agent$/i.test(c.trim()))); if(hi<0) hi=0;
  const hdr=rows[hi].map(h=>h.trim());
  const data=rows.slice(hi+1).filter(r=>r.length>=2&&r.some(c=>c.trim()!=='')&&!/subtotal|grand total|^—/i.test(r.join(' ')));
  const find=re=>hdr.findIndex(h=>re.test(h.toLowerCase()));
  const cAgent=find(/^agent/),cDuty=find(/duty|queue|active_queue|channel/),cStatus=find(/status/),
        cHour=find(/^hour|ist.?hour/),cCount=find(/count|tickets|resolved|total resolutions|^total$/),
        cRep=find(/repl/),cEsc=find(/escal/),cClo=find(/clos/);
  const hourCols=hdr.map((h,j)=>({h,j})).filter(o=>/^(\d{1,2})$/.test(o.h.trim())&&+o.h<24);
  const map={};
  const get=(name,duty,status)=>{ if(!map[name]) map[name]={name,email:'',duty:normDuty(duty),status:status||'',hours:{},breakdown:{}}; return map[name]; };
  if(cHour>=0){
    data.forEach(r=>{ const name=(r[cAgent]||'').trim(); if(!name) return;
      const a=get(name,cDuty>=0?r[cDuty]:'',cStatus>=0?r[cStatus]:'');
      const h=parseInt(r[cHour],10); if(isNaN(h)) return;
      const rep=cRep>=0?+r[cRep]||0:null,es=cEsc>=0?+r[cEsc]||0:null,cl=cClo>=0?+r[cClo]||0:null;
      const cnt=cCount>=0?+r[cCount]||0:((rep||0)+(es||0)+(cl||0));
      a.hours[h]=(a.hours[h]||0)+cnt;
      if(cRep>=0||cEsc>=0||cClo>=0) a.breakdown[h]={replies:rep,escalated:es,closed:cl};
    });
    state.fields=['replies','escalated','closed'].filter((_,k)=>[cRep,cEsc,cClo][k]>=0);
    state.metric='tickets';
  } else if(hourCols.length){
    data.forEach(r=>{ const name=(r[cAgent]||'').trim(); if(!name) return;
      const a=get(name,cDuty>=0?r[cDuty]:'',cStatus>=0?r[cStatus]:'');
      hourCols.forEach(o=>{ const v=+r[o.j]||0; if(v) a.hours[+o.h]=v; });
    });
    state.fields=[]; state.metric='tickets';
  } else {
    const cTotal=find(/total resolutions|^total$|resolved/);
    data.forEach(r=>{ const name=(r[cAgent]||'').trim(); if(!name) return;
      const a=get(name,cDuty>=0?r[cDuty]:'',cStatus>=0?r[cStatus]:'');
      const tot=cTotal>=0?+r[cTotal]||0:0; a.daily=tot;
      if(cRep>=0||cEsc>=0||cClo>=0) a.breakdown.daily={replies:+r[cRep]||0,escalated:+r[cEsc]||0,closed:+r[cClo]||0};
    });
    state.fields=['replies','escalated','closed'].filter((_,k)=>[cRep,cEsc,cClo][k]>=0);
    alert('Loaded a daily summary — heatmap needs an hourly export (Hour column or columns 0..23).');
  }
  state.agents=Object.values(map);
  state.date=guessDate(text);
}
function guessDate(t){ const m=t.match(/20\d\d-\d\d-\d\d/); return m?m[0]:'' }

function ingestJSON(text){
  const j=JSON.parse(text);
  if(Array.isArray(j.hourly_buckets)) return fromConsoleEmailLog(j);
  state.date=j.date||''; state.metric=j.metric||'tickets'; state.fields=j.fields||['replies','escalated','closed'];
  state.agents=(j.agents||[]).map(a=>({name:a.name,email:a.email||'',duty:normDuty(a.duty),status:a.status||'',
    hours:a.hours||{},breakdown:a.breakdown||{}}));
}

/* ── console wire adapter: /email-drafts/log hourly_buckets ──── */
function fromConsoleEmailLog(j){
  const map={};
  (j.hourly_buckets||[]).forEach(b=>{
    (b.agents||[]).forEach(a=>{
      const key=a.display_name||a.agent_id||'?';
      const ag=map[key]||(map[key]={name:key,email:a.agent_id||'',
        duty:normDuty(a.duty||a.active_queue||a.queue||''),
        status:a.status||'',hours:{},breakdown:{}});
      const t=a.total!=null?a.total:((a.replies||0)+(a.escalated||0)+(a.closed||0));
      ag.hours[b.hour]=(ag.hours[b.hour]||0)+t;
      ag.breakdown[b.hour]={replies:a.replies??null,escalated:a.escalated??null,closed:a.closed??null};
    });
  });
  state.agents=Object.values(map); state.date=j.date||'';
  state.metric='tickets'; state.fields=['replies','escalated','closed'];
}

/* ── live console fetch ──────────────────────────────────────── */
async function loadFromConsole(date){
  const base=(window.HEATMAP_API_BASE||(window.location.origin+'/api/v1/admin/email'));
  const url=base.replace(/\/$/,'')+'/drafts/log'+(date?`?date=${encodeURIComponent(date)}`:'');
  const r=await fetch(url,{credentials:'include',headers:{Accept:'application/json'}});
  if(!r.ok) throw new Error('HTTP '+r.status+' from '+url);
  ingestJSON(JSON.stringify(await r.json()));
  SAMPLE_FLAG.ref=null; render();
}

/* ── export ──────────────────────────────────────────────────── */
function dl(name,text,type){ const b=new Blob([text],{type}),u=URL.createObjectURL(b),a=document.createElement('a');
  a.href=u;a.download=name;a.click();URL.revokeObjectURL(u); }
function exportJSON(){
  dl(`cx-heatmap-${state.date||'data'}.json`,
     JSON.stringify({date:state.date,metric:state.metric,fields:state.fields,agents:state.agents},null,2),'application/json'); }
function exportCSV(){
  const f=state.fields,head=['Agent','Duty','Status','Hour','Total',...f];
  const out=[head.join(',')];
  state.agents.forEach(a=>HOURS_CAL.forEach(h=>{ const t=a.hours[h]||0; if(!t) return;
    const b=a.breakdown&&a.breakdown[h]||{};
    out.push([qc(a.name),a.duty,qc(a.status),h,t,...f.map(x=>b[x]??'')].join(','));
  }));
  dl(`cx-heatmap-${state.date||'data'}.csv`,out.join('\n'),'text/csv');
}
function qc(s){ s=String(s==null?'':s); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }

/* ── file handling ───────────────────────────────────────────── */
function loadText(name,text){
  try{ ((/\.json$/i.test(name)||text.trim().startsWith('{'))?ingestJSON:ingestCSV)(text); render(); }
  catch(e){ alert('Could not parse '+name+': '+e.message); }
}
document.getElementById('file').onchange=e=>{ const f=e.target.files[0]; if(!f) return;
  const r=new FileReader(); r.onload=()=>loadText(f.name,r.result); r.readAsText(f); };
['dragover','dragenter'].forEach(ev=>window.addEventListener(ev,e=>{
  e.preventDefault(); document.getElementById('drop').classList.add('show'); }));
['dragleave','drop'].forEach(ev=>window.addEventListener(ev,e=>{
  e.preventDefault(); if(ev==='drop'||e.relatedTarget===null) document.getElementById('drop').classList.remove('show'); }));
window.addEventListener('drop',e=>{ const f=e.dataTransfer.files[0]; if(!f) return;
  const r=new FileReader(); r.onload=()=>loadText(f.name,r.result); r.readAsText(f); });

/* ── controls ────────────────────────────────────────────────── */
document.getElementById('dutyFilter').onclick=e=>{ if(e.target.dataset.d){
  [...e.currentTarget.children].forEach(b=>b.classList.toggle('on',b===e.target));
  state.duty=e.target.dataset.d; render(); }};
document.getElementById('orderSeg').onclick=e=>{ if(e.target.dataset.o){
  [...e.currentTarget.children].forEach(b=>b.classList.toggle('on',b===e.target));
  state.order=e.target.dataset.o; render(); }};
document.getElementById('sort').onchange=e=>{ state.sort=e.target.value; render(); };
document.getElementById('expCsv').onclick=exportCSV;
document.getElementById('expJson').onclick=exportJSON;
document.getElementById('loadSample').onclick=()=>{ loadSample(); render(); };
document.getElementById('loadConsole').onclick=()=>{
  const d=new URLSearchParams(location.search).get('date')||state.date.replace(/ .*/,'')||'';
  loadFromConsole(d).catch(e=>alert('Console load failed: '+e.message+
    '\n\nThis works only when embedded on the console origin (auth cookie). Import a file instead.'));
};
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

/* deep-link: ?source=console[&date=YYYY-MM-DD] */
(function(){
  const q=new URLSearchParams(location.search);
  if(q.get('source')==='console')
    loadFromConsole(q.get('date')||'').catch(()=>{ loadSample(); render(); });
})();

/* ── sample data (synthetic, no real names) ──────────────────── */
const SAMPLE_FLAG={ref:null};
function loadSample(){
  const defs=[
    ['Agent 01','Email','online'],['Agent 02','Email','away'],
    ['Agent 03','Email','online'],['Agent 04','Email','away'],
    ['Agent 05','Deferred','online'],['Agent 06','Deferred','busy'],
    ['Agent 07','Deferred','online'],['Agent 08','Deferred','away'],
    ['Agent 09','Deferred','online'],['Agent 10','Deferred','away'],
    ['Agent 11','Email','online'],
  ];
  let seed=7; const rnd=()=>{ seed=(seed*9301+49297)%233280; return seed/233280; };
  const agents=defs.map(([name,duty,status])=>{
    const hours={},breakdown={};
    HOURS_CAL.forEach(h=>{
      const active=duty==='Email'?(h>=7&&h<=23):true;
      if(active&&rnd()>0.32){
        const rep=Math.floor(rnd()*12),clo=Math.floor(rnd()*8),es=rnd()>0.85?1:0;
        const t=rep+clo+es; if(t){hours[h]=t;breakdown[h]={replies:rep,escalated:es,closed:clo};}
      }
    });
    return {name,email:name.toLowerCase().replace(/ /g,'.')+'@example.com',duty,status,hours,breakdown};
  });
  state.date='2026-06-01 (sample)'; state.metric='tickets'; state.fields=['replies','escalated','closed'];
  state.agents=agents; SAMPLE_FLAG.ref=agents;
}
loadSample(); render();
</script>
